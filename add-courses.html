<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add-courses.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>Add Course</title>
</head>
<body>
    <header>
    <nav>
        <h1 class="logo">Course Organizer</h1>
        <a href="index.html">Home</a>
        <a href="courses.html">My courses</a>
        <a href="add-courses.html" class="active">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    </header>
    <main>
      <section class="top">
        <p class="note"> Please fill in the course details below to add a new course</p>
      </section>
      <section class="bottom">
        <div class="container">
        <form action="" method="get" novalidate>
            <label>Course Name</label>
            <input type="text" required placeholder="Enter Course Name">
            <br>
            <label>Instractor Name</label>
            <input type="text" required placeholder="Enter Instractor Name">
            </br>
            <br>
            <label>Cerdit Hours</label>
            <input type="number" required placeholder="Enter Cerdit Hours">
            </br>
            <label> Notes</label>
            <textarea placeholder="Write Your Notes"></textarea>
            <br>
            <div class="button">
            <input type="submit" value="Add Course">
            </div>
            </form>
      </div>
    
    
     </section>
   </main>
   <footer class="footer">
    <h2 class="logo-footer">Course Organizer</h2>
    <p class="copy">@ 2026 Course Organizer All Rights Reserved</p>
    <p class="by">By Maryam Mohamed</p>
   </footer>
</body>
</html>
